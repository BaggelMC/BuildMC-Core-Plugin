messages:
  rules: "<gray>==============================</gray>\n\n<gold>Check out the full rules <blue><click:open_url:'https://baggel.de/projects/buildmc/rules/'>[HERE]</click></blue>!</gold>\n\n<gray>==============================</gray>"

  first-time-join:
    # Use %player_name% as a placeholder for the name of the player.
    message: "<green>Welcome %player_name%!</green>"

  guides:

    guide-not-found: "<red>This guide doesn't exist!</red>"

    commands: |-
      ==================== <blue>Commands</blue> ====================
      <gray>Here is a list of custom commands you can use:</gray>
      
      <gray>- </gray><gold>/rules</gold>  | Gives you the rules of the server
      <gray>- </gray><gold>/spawn</gold> | Teleports you to the worldspawn
      <gray>- </gray><gold>/claim</gold>   | Manage your claims
      <gray>- </gray><gold>/status</gold> | Set or Remove your status
    spawn-elytra: |-
      ==================== <blue>Spawn-Elytra</blue> ====================
      When you are in an area where the spawn-elytra is enabled.
      You can <gold>double jump to glide</gold>,
      and press <gold><key:key.swapOffhand> to boost</gold> yourself of the ground.

  spawn-elytra:
    boost-hint: "Press <key:key.swapOffhand> to boost!"
    firework-disabled-hint: "<red>Firework boost is disabled for spawn elytra.</red>"

    pos1-set: "<green>Position 1 set.</green>"
    pos2-set: "<green>Position 2 set.</green>"

    success: "<green>Elytra zone created.</green>"

    error:
      different-worlds: "<red>Positions must be in the same world!</red>"

  end-event:
    opened: "<green>The end is now 'open'."
    closed: "<green>The end is now 'closed'."

    broadcast-closed: "<gold>--------------------------------</gold>\n\n<yellow>The End has been <red>CLOSED</red>!</yellow>\n\n<gold>--------------------------------</gold>"
    broadcast-opened: "<gold>--------------------------------</gold>\n\n<yellow>The End has been <green>OPENED</green>!</yellow>\n\n<gold>--------------------------------</gold>"
    closed-message: "<red>The End is currently closed."

  error:
    general: "<red>An error occurred: <red>%error_message%"
    general-str: "An error occurred: %error_message%"
    no-permission: "<red>You do not have permission to perform this action.</red>"
    no-permission-str: "You do not have permission to perform this action."
    not-a-player: "<red>This command can only be used by players.</red>"
    not-a-player-str: "This command can only be used by players."

    not-in-a-team: "<red>You need to be in a team to perform this action.</red>"

    command-disabled: "<red>This command has been disabled.</red>"

    sql: "<red>An SQL error occurred.</red>"

  teleport:
    not-working: "<red>You cannot use '/spawn' right now!</red>"
    cancelled: "<red>The teleport was cancelled!</red>"
    successful: "<green>Successfully teleported you!</green>"
    counter: "<white>Don't move for %seconds% seconds...</white>"

  deaths:
    error:
      player-not-found: "<red>The specified player was not found."
      load-failed: "<red>Failed to load deaths."
      not-found: "<red>Death ID not found."
      wrong-player: "<red>This death does not belong to that player."
      restore-failed: "<red>Failed to restore death."
      invalid-id: "<red>Invalid death ID"

    none: "<yellow>No deaths recorded for %player%."
    list-part: "<yellow>Deaths for "

    restored: "<green>Death restored successfully."

  claims:
    tool:
      tool-name: "Select Claim Corners"

      tool-tooltip-line1: "Use this tool to set the corners of your claim."
      tool-tooltip-line2: "Use '/claim help' to get help."
      tool-tooltip-line3: ""
      tool-tooltip-line4: ""

      tool-cooldown: "<red>You need to wait!</red>"

      give-success: "<green>Success! Click <blue><click:run_command:/claim help>[HERE]</click></blue> to get help.</green>"
      full-inventory: "<red>Your inventory is full! Please make space for the claim tool.</red>"

      selection-too-large: "<red>Your selection cannot be wider or longer than %selection_limit% chunks!</red>"

      no-first-selection: "<red>You need to set the first position!</red>"

      set-pos1: "<green>Successfully set position 1!</green>"
      set-pos2: "<green>Successfully set position 2!</green>"

      both-positions-set: "<green>Both positions set! Area can now be claimed.</green>"

      no-team-to-select: "<red>You need to be in a team to set a team claim!</red>"

      successfully-claimed-area: |-
        <gold>---------------------------------------</gold>
        
        <green>Successfully claimed area!</green>
        
        <blue>You have </blue>%chunks_left%<blue> chunks left to claim</blue>
        
        <gold>---------------------------------------</gold>

      successfully-claimed-area-no-count: |-
        <gold>---------------------------------------</gold>
        
        <green>Successfully claimed area!</green>
        
        <gold>---------------------------------------</gold>

      successfully-removed-area: |-
        <gold>---------------------------------------</gold>
        
        <green>Successfully removed area!</green>
        <blue>You now have </blue>%chunks_left%<blue> chunks left to claim</blue>
        
        <gold>---------------------------------------</gold>

      successfully-removed-area-no-count: |-
        <gold>---------------------------------------</gold>
        
        <green>Successfully removed area!</green>
        
        <gold>---------------------------------------</gold>
      

      other-claim-in-selection: "\n<red>There is someone else's claim in your selection!</red>\n"

      no-chunks-left: "<red>You don't have any chunks left to claim!</red>"

    create:
      missing-positions: "<red>You have not set both positions yet.</red>"
      success: "<blue>------------------------</blue>\n<green>Successfully claimed area!\n</green>\n<green>You have <gold>%remaining_claims%</gold> chunks left.</green>\n<blue>------------------------</blue>"
      failed: "<red>Error: Failed to claim region.</red>"

      success-server: "<blue>------------------------</blue>\n<green>Successfully claimed server area!</green>\n<blue>------------------------</blue>"
      success-placeholder: "<blue>------------------------</blue>\n<green>Successfully claimed placeholder area!</green>\n<blue>------------------------</blue>"

      world-not-allowed: "<red>You cannot create a claim in this dimension!</red>"

      invalid-type: "<red>Error: Argument 'type' must be either 'player' or 'team'.</red>"
      different-worlds: "<red>Error: Both positions must be in the same world.</red>"
      no-remaining-claims: "<red>You do not have enough chunks left to claim.\nChunks left: %remaining_claims%</red>"
      duplicate-name: "<red>There already is a claim with that name.</red>"

      error-database: "<red>There was a database error.</red>"

      protected-server: "<red>The area you're trying to claim is protected by the server.</red>"
      overlap: "<red>The area you're trying to claim already contains claims by someone else.</red>"

    remove:
      invalid-type: "<red>Error: Argument 'type' must be either 'player' or 'team'.</red>"
      not-found: "<red>That claim could not be found or is not owned by you."
      failed: "<red>Failed to remove claim.</red>"
      success: "<green>Claim successfully removed.</green>"

    who:
      team-message: "<gold>This chunk is owned by team <white>%owner%</white>.</gold>"
      player-message: "<gold>This chunk is owned by player <white>%owner%</white>.</gold>"
      server-message: "<gold>This chunk is owned by the server.</gold>"
      unclaimed: "<gold>This chunk belongs to nobody or the chunk isn't loaded.</gold>"

    whitelist:
      added: "<green>Player has been added to the claim whitelist."
      removed: "<green>Player has been removed from the claim whitelist."
      already: "<yellow>That player is already whitelisted."
      error: "<red>An error occurred while modifying the whitelist."
      invalid-action: "<red>Invalid action. Use 'add' or 'remove'."
      not-on-list: "<yellow>That player is not on the whitelist."
      already-added: "<yellow>That player is already on the whitelist."
      player-not-found: "<red>The specified player was not found."
      claim-not-found: "<red>That claim could not be found or is not owned by you."

    protections:
      invalid-type: "<red>Invalid claim type! Use <yellow>player</yellow> or <yellow>team</yellow>."
      invalid-flag: "<red>That protection flag does not exist."
      invalid-value: "<red>Invalid value! Must be <yellow>true</yellow> or <yellow>false</yellow>."
      not-found: "<red>No claim found with that name."
      added: "<green>Protection flag <yellow>%flag%</yellow> was <green>enabled</green> for this claim."
      removed: "<green>Protection flag <yellow>%flag%</yellow> was <red>disabled</red> for this claim."

    help-message: |-
      <gold>------------- <green>Claims Help</green> -------------</gold>
      <aqua>Click <green><click:open_url:'https://baggel.de/plugins/en/core/docs/1.1.0/user/claims'>here</click></green> to open the full documentation.</aqua>
      <gray>- Use '<gold>/claim claimtool</gold>' to get the claim tool.</gray>
      <gray>- Left-Click to select your first chunk.</gray>
      <gray>- Right-Click to select your second chunk.</gray>
      <gray>- Use '<gold>/claim create \<team/player> <name></gold>'
        to create a claim for yourself or your team.</gray>
      
      <gray>- Use '<gold>/claim</gold>' to open the claims menu.
      <gray>- In the claims menu you can manage the settings of your claims.
      <gold>---------------------------------------</gold>

    ui:
      general:
        previous: "<yellow>Previous</yellow>"
        next: "<yellow>Next</yellow>"
        page-indicator: "<yellow>Page %current%/%total%</yellow>"

        back: "<red>Back</red>"

        confirm: "<red>Confirm</red>"
        cancel: "<green>Cancel</green>"

      errors:
        no-item-meta: "<red>Error: Failed to generate item-meta."

      select-menu:
        title: "<gold>Select a Claim</gold>"

        player-type: "<gray>Type: Player Claim</gray>"
        team-type: "<gray>Type: Team Claim</gray>"
        server-type: "<gray>Type: Server Claim</gray>"
        placeholder-type: "<gray>Type: Placeholder Claim</gray>"
        unknown-type: "<gray>Type: Unknown</gray>"

        id: "<dark_gray>ID: %id%</dark_gray>"
        empty: "<red>You have not claimed anything yet.</red>"

      edit-menu:
        title: "<gold>Edit Claim: '%claim%'</gold>"

        info-name: "<aqua>Claim Info</aqua>"
        info: |-
          <gray>From:</gray> <green>X <blue>%minX%</blue> | Z <blue>%minZ%</blue></green>
          <gray>To:</gray>    <green>X <blue>%maxX%</blue> | Z <blue>%maxZ%</blue></green>
          <gray>In:</gray>    <green>%dimension%</green>

        protections: "<green>Protections</green>"
        no-protections-available: "<red>No available protections.</red>"
        whitelist: "<aqua>Whitelist</aqua>"
        no-whitelist-available: "<red>This claim type does not allow for whitelisting.</red>"
        delete: "<red>Delete Claim</red>"

        delete-confirm-menu:
          title: "<red>Confirm Deletion of '%claim%'</red>"

          success: "<green>Claim deleted successfully.</green>"
          fail: "<red>Error: Failed to delete claim.</red>"

      protections-menu:
        title: "<gold>Protections: '%claim%'</gold>"

        enabled: "<red>Blocked</red> <gray>(Click to allow)</gray>"
        disabled: "<green>Allowed</green> <gray>(Click to block)</gray>"

        toggle-hint: "<dark_gray>Click below to toggle</dark_gray>"

      whitelist-menu:
        title: "<gold>Whitelist for '%claim%'</gold>"

        remove: "<red>Remove player</red>"

        add-button:
          name: "<green>Add Player</green>"
          lore-line1: "<gray>Use the <gold>/claim whitelist add</gold> command</gray>"
          lore-line2: "<gray>to whitelist someone.</gray>"
          click-info: "<gray><italic>> Click this to insert the whitelist command <</italic></gray>"

        delete-confirm-menu:
          title: "Remove %player%?"
          success: "<green>Player removed from whitelist!</green>"

  status:
    successfully-removed: "<green>Successfully removed your status!</green>"
    join-doesn't-exist: "<red>Your status has been removed.</red>"
    not-found: "<red>Seems like this status doesn't exist.</red>"
    successfully-set: "<green>Successfully set status! <gray><click:run_command:/status remove>[Click here to remove]</click></gray></green>"
    not-in-team: "<red>You are not in the required team for this status!</red>"
    no-permission: "<red>You don't have the required permissions for this status!</red>"
    cannot-set: "<red>Your status can't be set!</red>"

